! Cisco Switch Configuration Baseline - SENSITIVE PRODUCTION SANCTUARY
! Device Name: ams-core-switch-01
! Location: Amsterdam DC 1 Core
!
hostname ams-core-switch-01
!
enable secret 5 $1$mERQ$P7eJ.c4F1lUeW.A9aZ7mC1
!
username admin privilege 15 password cleartextPass123
username operator privilege 5 password OperatorPass456
username automation_svc privilege 15 password AutoServicePass789
!
snmp-server community NetOpsSecretRO RO
snmp-server community NetOpsSecretRW RW
!
interface GigabitEthernet1/0/1
 description Uplink to Internet Gateway
 ip address 192.0.2.1 255.255.255.252
!
interface GigabitEthernet1/0/11
 description Primary Datacenter Transit Trunk
 ip address 10.120.45.1 255.255.255.0
 mtu 9216
!
interface GigabitEthernet1/0/12
 description Flapping Trunk Segment to ams-leaf-02
 ip address 10.120.45.5 255.255.255.0
 mtu 1500
!
interface GigabitEthernet1/0/13
 description Interconnect Link to Secure Database DB01
 ip address 10.120.100.1 255.255.255.252
 mtu 9216
!
router bgp 65001
 neighbor 10.120.45.2 remote-as 65001
 neighbor 10.120.45.2 update-source GigabitEthernet1/0/11
 neighbor 10.120.100.2 remote-as 65002
 neighbor 10.120.100.2 description Primary Database Peer
!
ip route 0.0.0.0 0.0.0.0 10.120.45.254
!
end
